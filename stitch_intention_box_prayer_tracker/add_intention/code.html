<style>

        .bottom-sheet-enter-active { transform: translateY(0); opacity: 1; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease-out; }

<body class="bg-background text-on-background antialiased min-h-screen relative overflow-hidden flex flex-col font-body-md">
<!-- Top Navigation (Active: None specifically, generic layout context) -->
<header class="fixed top-0 w-full z-40 bg-surface/80 dark:bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 flex items-center justify-between px-margin-mobile h-16 w-full">
<button class="text-secondary dark:text-secondary hover:text-secondary dark:hover:text-secondary transition-colors duration-300 opacity-80 scale-95 transition-all">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile text-primary dark:text-primary tracking-tight">Sacred Intentions</h1>
<button class="text-on-surface-variant dark:text-on-surface-variant hover:text-secondary dark:hover:text-secondary transition-colors duration-300">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Canvas (Background Context) -->
<main class="flex-grow pt-24 px-margin-mobile pb-32 opacity-30 pointer-events-none filter blur-sm transition-all duration-500">
<div class="space-y-section-gap">
<div class="p-5 border border-outline-variant/20 rounded-lg bg-surface-container flex items-start gap-4">
<span class="material-symbols-outlined text-secondary mt-1">vital_signs</span>
<div>
<h2 class="font-headline-sm text-headline-sm text-primary mb-2">Morning Clarity</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Guide my thoughts to remain focused on what truly matters today.</p>
</div>
</div>
<div class="p-5 border border-outline-variant/20 rounded-lg bg-surface-container flex items-start gap-4">
<span class="material-symbols-outlined text-secondary mt-1">favorite</span>
<div>
<h2 class="font-headline-sm text-headline-sm text-primary mb-2">Patience in Chaos</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Grant me the stillness to pause before reacting.</p>
</div>
</div>
</div>
</main>
<!-- Overlay Backdrop -->
<div aria-hidden="true" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 backdrop-enter-active" id="backdrop"></div>
<!-- Bottom Sheet -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container rounded-t-3xl z-50 border-t border-outline-variant/30 shadow-2xl flex flex-col bottom-sheet-enter-active max-h-[795px]" id="bottomSheet">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-4 pb-2 cursor-grab active:cursor-grabbing">
<div class="w-12 h-1 bg-outline-variant rounded-full"></div>
</div>
<div class="px-margin-mobile pt-2 pb-12 overflow-y-auto space-y-8">
<header class="flex justify-between items-center">
<h2 class="font-headline-lg text-headline-lg-mobile text-primary">New Intention</h2>
<button aria-label="Close" class="text-on-surface-variant hover:text-primary transition-colors p-2" id="closeSheet">
<span class="material-symbols-outlined text-[28px]">close</span>
</button>
</header>
<form class="space-y-10">
<!-- Intention Input -->
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-secondary uppercase tracking-widest" for="intentionText">The Intention</label>
<textarea class="w-full bg-transparent border-0 border-b border-outline-variant/50 focus:border-secondary ledger-input font-body-lg text-body-lg text-primary placeholder:text-on-surface-variant/50 p-0 py-2 resize-none transition-colors" id="intentionText" placeholder="Write your focus..." rows="3"></textarea>
</div>
<!-- Duration Input -->
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-secondary uppercase tracking-widest" for="durationDays">Duration (Days)</label>
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full border border-outline-variant flex items-center justify-center text-primary hover:border-secondary transition-colors" onclick="document.getElementById('durationDays').value = Math.max(1, parseInt(document.getElementById('durationDays').value || 1) - 1)" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
<input class="w-20 text-center bg-transparent border-0 border-b border-outline-variant/50 focus:border-secondary ledger-input font-headline-md text-headline-md text-primary p-0 py-1 transition-colors appearance-none" id="durationDays" min="1" type="number" value="7"/>
<button class="w-10 h-10 rounded-full border border-outline-variant flex items-center justify-center text-primary hover:border-secondary transition-colors" onclick="document.getElementById('durationDays').value = parseInt(document.getElementById('durationDays').value || 1) + 1" type="button">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Votive Toggle -->
<div class="flex items-center justify-between pt-4">
<div>
<span class="block font-headline-sm text-headline-sm text-primary mb-1">Light a Votive</span>
<span class="block font-body-md text-body-md text-on-surface-variant text-sm">Keep this intention illuminated</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-variant rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-secondary after:border-secondary after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-outline-variant/30"></div>
</label>
</div>
<!-- Save Action -->
<div class="pt-6">
<button class="w-full bg-secondary text-on-secondary font-label-caps text-label-caps uppercase tracking-[0.2em] py-4 rounded DEFAULT hover:bg-secondary-fixed transition-colors" type="button">
                        Seal Intention
                    </button>
</div>
</form>
</div>
</div>
<script>
        // Simple close animation logic
        document.getElementById('closeSheet').addEventListener('click', function() {
            const sheet = document.getElementById('bottomSheet');
            const backdrop = document.getElementById('backdrop');
            
            sheet.style.transform = 'translateY(100%)';
            sheet.style.opacity = '0';
            backdrop.style.opacity = '0';
            
            setTimeout(() => {
                // In a real app this would route back or remove elements
                sheet.style.display = 'none';
                backdrop.style.display = 'none';
                document.querySelector('main').classList.remove('opacity-30', 'blur-sm');
            }, 400);
        });

        // Basic textarea auto-grow
        const textarea = document.getElementById('intentionText');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
