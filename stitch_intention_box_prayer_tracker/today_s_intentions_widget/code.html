<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<style>
        body {
            /* Simulating a mobile home screen background for context */
            background-image: linear-gradient(to bottom, #0a0a0a, #131313);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="min-h-screen flex items-center justify-center p-6 antialiased selection:bg-secondary/30 selection:text-secondary text-primary">
<!-- Widget Container (Simulating 4x2 size roughly) -->
<div class="w-full max-w-[340px] bg-surface-container border border-secondary/30 rounded-[20px] p-5 shadow-2xl shadow-black/80 flex flex-col relative overflow-hidden group">
<!-- Subtle background glow effect on hover -->
<div class="absolute inset-0 bg-gradient-to-br from-secondary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none"></div>
<!-- Header -->
<div class="flex items-center justify-between mb-5 relative z-10">
<h2 class="font-headline-sm text-headline-sm text-primary tracking-wide">Today's Intentions</h2>
<button aria-label="Add new intention" class="flex items-center justify-center w-8 h-8 rounded-full bg-surface-container-high border border-outline-variant/30 text-secondary hover:bg-secondary hover:text-on-secondary transition-all duration-300 focus:outline-none focus:ring-1 focus:ring-secondary/50">
<span class="material-symbols-outlined text-[20px] font-light">add</span>
</button>
</div>
<!-- Intentions List -->
<ul class="flex flex-col space-y-4 relative z-10">
<!-- Intention Item 1 -->
<li class="flex items-start group/item">
<div class="mt-0.5 mr-3 flex-shrink-0">
<span class="material-symbols-outlined text-secondary text-[18px] opacity-90 group-hover/item:opacity-100 group-hover/item:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">flare</span>
</div>
<div class="flex-1 border-b border-outline-variant/20 pb-3">
<p class="font-body-md text-body-md text-on-surface leading-snug">Healing and strength for the journey ahead</p>
</div>
</li>
<!-- Intention Item 2 -->
<li class="flex items-start group/item">
<div class="mt-0.5 mr-3 flex-shrink-0">
<span class="material-symbols-outlined text-secondary text-[18px] opacity-90 group-hover/item:opacity-100 group-hover/item:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">flare</span>
</div>
<div class="flex-1 border-b border-outline-variant/20 pb-3">
<p class="font-body-md text-body-md text-on-surface leading-snug">Cultivate patience in moments of stillness</p>
</div>
</li>
<!-- Intention Item 3 -->
<li class="flex items-start group/item">
<div class="mt-0.5 mr-3 flex-shrink-0">
<span class="material-symbols-outlined text-outline text-[18px] opacity-50 group-hover/item:text-secondary group-hover/item:opacity-90 transition-colors" style="font-variation-settings: 'FILL' 0;">flare</span>
</div>
<div class="flex-1 pb-1">
<p class="font-body-md text-body-md text-on-surface-variant italic leading-snug">Awaiting illumination...</p>
</div>
</li>
</ul>
</div>
